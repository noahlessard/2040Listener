name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Clone Pico SDK
        run: |
          git clone --branch 2.1.1 --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init --recursive

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk
          make -j$(nproc)

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.uf2
